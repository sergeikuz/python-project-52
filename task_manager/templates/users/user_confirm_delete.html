{% extends "base.html" %}
{% load django_bootstrap5 %}
{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}
{% block content %}

<h2>Confirm Delete</h2>
<form method="post">
    {% csrf_token %}
    <p>Are you sure you want to delete {{ object.username }}?</p>
    <button type="submit">Confirm</button>
    <a href="{% url 'users:user_list' %}">Cancel</a>
</form>

{% endblock %}
